name: Android Release Guardrails

on:
  workflow_dispatch:

jobs:
  verify-android-release-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        run: npm run smoke

      - name: Build and verify Android release artifacts
        run: npm run release:android -- --tag v0.0.0-ci --allow-debug-signing

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-guardrails-v0.0.0-ci
          path: dist/releases/v0.0.0-ci/
          if-no-files-found: error
